name: Run Social Auto Poster

on:
  # Does not work since we need to validate the device after Facebook login
  # schedule:
    # - cron: "*/5 * * * *"  # Every 5 minutes (for testing purpose)
    # - cron: "0 10 * * 2"  # Every Tuesday at 10:00 UTC (11:00 Belgium time)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.12"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Install clipboard tools
        run: sudo apt-get install -y xclip xsel
      
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Selenium script with Xvfb
        run: xvfb-run -a python3 main.py # Add --dry-run to test first
        env:
          POST_TEXT_BACK_TO_SCHOOL: ${{ secrets.POST_TEXT_BACK_TO_SCHOOL }}
          POST_TEXT_AUTUMN_HOLIDAYS: ${{ secrets.POST_TEXT_AUTUMN_HOLIDAYS }}
          POST_TEXT_MID_TERM: ${{ secrets.POST_TEXT_MID_TERM }}
          POST_TEXT_EXAMS_DECEMBER: ${{ secrets.POST_TEXT_EXAMS_DECEMBER }}
          POST_TEXT_CHRISTMAS_HOLIDAYS: ${{ secrets.POST_TEXT_CHRISTMAS_HOLIDAYS }}
          POST_TEXT_SECOND_TRIMESTER_1: ${{ secrets.POST_TEXT_SECOND_TRIMESTER_1 }}
          POST_TEXT_CARNIVAL_HOLIDAYS: ${{ secrets.POST_TEXT_CARNIVAL_HOLIDAYS }}
          POST_TEXT_SECOND_TRIMESTER_2: ${{ secrets.POST_TEXT_SECOND_TRIMESTER_2 }}
          POST_TEXT_SPRING_HOLIDAYS: ${{ secrets.POST_TEXT_SPRING_HOLIDAYS }}
          POST_TEXT_EXAMS_JUNE: ${{ secrets.POST_TEXT_EXAMS_JUNE }}
          POST_TEXT_SUMMER_HOLIDAYS: ${{ secrets.POST_TEXT_SUMMER_HOLIDAYS }}
          FACEBOOK_EMAIL: ${{ secrets.FACEBOOK_EMAIL }}
          FACEBOOK_PASSWORD: ${{ secrets.FACEBOOK_PASSWORD }}
